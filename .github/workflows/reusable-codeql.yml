name: Reusable CodeQL Scan

on:
  workflow_call:
    inputs:
      language:
        description: "CodeQL language to scan (java, javascript, python, csharp)"
        required: true
        type: string
      config-file:
        description: "Path to codeql-config.yml inside the calling repo"
        required: false
        type: string
        default: ".github/codeql/codeql-config.yml"
      build-command:
        description: "Custom build command — leave empty to use autobuild"
        required: false
        type: string
        default: ""
      ram:
        description: "RAM in MB allocated to CodeQL analysis"
        required: false
        type: number
        default: 4096
      threads:
        description: "Number of threads for CodeQL analysis"
        required: false
        type: number
        default: 2
      upload-artifact:
        description: "Upload SARIF as workflow artifact for central aggregation"
        required: false
        type: boolean
        default: true
      query-profile:
        description: "Query profile: standard | strict | pci | internal"
        required: false
        type: string
        default: "standard"

    secrets:
      APPSEC_TOKEN:
        description: "Token for posting results to central dashboard (optional)"
        required: false

jobs:
  analyze:
    name: CodeQL (${{ inputs.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Cache CodeQL databases between runs — reduces P95 scan time by ~40%
      - name: Cache CodeQL database
        uses: actions/cache@v4
        with:
          path: ~/.codeql/databases
          key: codeql-db-${{ inputs.language }}-${{ github.repository }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            codeql-db-${{ inputs.language }}-${{ github.repository }}-${{ github.ref_name }}-
            codeql-db-${{ inputs.language }}-${{ github.repository }}-

      # Resolve which shared config to use based on query-profile input
      # This lets AppSec control which queries run on which repo types
      # without touching individual app repos
      - name: Resolve query profile
        run: |
          PROFILE="${{ inputs.query-profile }}"
          BASE="https://raw.githubusercontent.com/chagnti/appsec-codeql-central/main/configs"
          case "$PROFILE" in
            strict)  CONFIG_URL="$BASE/java-strict.yml" ;;
            pci)     CONFIG_URL="$BASE/java-payments.yml" ;;
            internal) CONFIG_URL="$BASE/java-internal-tools.yml" ;;
            *)       CONFIG_URL="$BASE/java-servlet.yml" ;;
          esac
          echo "Using config: $CONFIG_URL"
          curl -sSL "$CONFIG_URL" -o .github/codeql/shared-config.yml
          echo "SHARED_CONFIG=.github/codeql/shared-config.yml" >> $GITHUB_ENV

      # Download and run suppression validator BEFORE scan starts
      # If any unapproved codeql[] comment exists in code → job fails here
      # Developer must go through AppSec approval process first
      # Pinned to a specific commit SHA — not @main
      # If central repo is compromised, attackers cannot push a new
      # script that auto-approves all suppressions. SHA must be
      # manually updated by AppSec after reviewing each change.
      - name: Download suppression validator
        env:
          CENTRAL_SHA: "11a7233"   # update this after each central repo change
        run: |
          curl -sSL \
            https://raw.githubusercontent.com/chagnti/appsec-codeql-central/${CENTRAL_SHA}/scripts/validate-suppressions.py \
            -o validate-suppressions.py
          curl -sSL \
            https://raw.githubusercontent.com/chagnti/appsec-codeql-central/${CENTRAL_SHA}/suppressions/approved-suppressions.yml \
            -o approved-suppressions.yml

      - name: Validate inline suppressions against AppSec registry
        run: |
          pip install pyyaml -q
          python3 validate-suppressions.py \
            --source-root . \
            --registry approved-suppressions.yml \
            --repo ${{ github.repository }}

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ inputs.language }}
          config-file: ${{ inputs.config-file }}
          # Tune RAM and threads — prevents OOM on large repos
          ram: ${{ inputs.ram }}
          threads: ${{ inputs.threads }}

      # Use custom build command if provided, else autobuild
      - name: Build (custom command)
        if: inputs.build-command != ''
        run: ${{ inputs.build-command }}

      - name: Build (autobuild)
        if: inputs.build-command == ''
        uses: github/codeql-action/autobuild@v3

      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ inputs.language }}"
          upload: true
          # Output SARIF file for artifact upload
          output: sarif-results

      # Download the FP filter script from the central repo
      # This runs AFTER analyze produces the SARIF but BEFORE we upload
      - name: Download FP filter script
        run: |
          curl -sSL \
            https://raw.githubusercontent.com/chagnti/appsec-codeql-central/main/scripts/filter-sarif.py \
            -o filter-sarif.py

      # Run the FP filter — reads sarif-results/*.sarif, writes filtered versions
      - name: Filter false positives from SARIF
        run: |
          python3 filter-sarif.py \
            --input sarif-results/${{ inputs.language }}.sarif \
            --output sarif-results/${{ inputs.language }}-filtered.sarif \
            --min-severity warning

      # Upload SARIF as artifact so central dashboard can pull it
      - name: Upload SARIF artifact
        if: inputs.upload-artifact == true
        uses: actions/upload-artifact@v4
        with:
          name: sarif-${{ inputs.language }}-${{ github.repository_owner }}-${{ github.event.repository.name }}
          path: sarif-results/*-filtered.sarif   # upload only the filtered version
          retention-days: 30

      # Post summary to job output for easy reading in Actions UI
      - name: Post scan summary
        if: always()
        run: |
          echo "## CodeQL Scan Complete" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Repo | ${{ github.repository }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Language | ${{ inputs.language }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| RAM | ${{ inputs.ram }} MB |" >> $GITHUB_STEP_SUMMARY
          echo "| Threads | ${{ inputs.threads }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Results visible in Security → Code scanning alerts" >> $GITHUB_STEP_SUMMARY
